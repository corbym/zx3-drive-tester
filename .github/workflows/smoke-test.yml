name: Smoke Test

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - docs/screenshots/**
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}-toolchain:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull prebuilt toolchain image
        id: pull-toolchain
        run: |
          if docker pull "${{ steps.image.outputs.ref }}"; then
            docker tag "${{ steps.image.outputs.ref }}" zx3-disk-test:ci
            if docker run --rm zx3-disk-test:ci go version >/dev/null 2>&1; then
              echo "source=pulled" >> "$GITHUB_OUTPUT"
            else
              echo "Pulled image missing Go toolchain, forcing local build"
              echo "source=built" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "source=built" >> "$GITHUB_OUTPUT"
          fi

      - name: Build fallback toolchain image
        if: steps.pull-toolchain.outputs.source == 'built'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: zx3-disk-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build project artifacts
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && ./deploy.sh"

      - name: Run OCR smoke tests (headless font)
        run: |
          docker run --rm \
            -e ZX3_REQUIRE_EMU_SMOKE=1 \
            -e ZX3_TAP_PATH=out/headless/disk_tester.tap \
            -e ZX3_DSK_PATH=out/headless/disk_tester_plus3.dsk \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && go test ./tests -count=1 -v -run 'TestTapCodeSizeBudget|TestMapHeapStackHeadroom|TestMenu|TestReport|TestReturn|TestRunAll|TestMotor|TestRecal'"

      - name: Run screenshot capture tests (ROM font)
        run: |
          docker run --rm \
            -e ZX3_REQUIRE_EMU_SMOKE=1 \
            -e ZX3_TAP_PATH=out/headless/disk_tester.tap \
            -e ZX3_DSK_PATH=out/headless/disk_tester_plus3.dsk \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && go test ./tests -count=1 -v -run TestScreenCaptureStages"

      - name: Create and push semver tag
        id: tag_semver
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          git fetch --tags --force

          TAG=$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$TAG" ]; then
            latest_tag=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -z "$latest_tag" ]; then
              TAG="v0.1.0"
            else
              version=${latest_tag#v}
              major=$(echo "$version" | cut -d. -f1)
              minor=$(echo "$version" | cut -d. -f2)
              patch=$(echo "$version" | cut -d. -f3)
              TAG="v${major}.${minor}.$((patch + 1))"
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Tag $TAG (${GITHUB_SHA})"
            git push origin "$TAG"
            echo "Created and pushed $TAG"
          else
            echo "Using existing tag on this commit: $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decide artifact name
        id: artifact_name
        if: success()
        run: |
          if [ -n "${{ steps.tag_semver.outputs.tag }}" ]; then
            echo "name=zx3-disk-test-${{ steps.tag_semver.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=zx3-disk-test-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish README screenshots from tagged build
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.tag_semver.outputs.tag != ''
        env:
          TAG: ${{ steps.tag_semver.outputs.tag }}
        run: |
          set -euo pipefail

          SCREEN_SRC="out/screen-check"
          LATEST_DIR="docs/screenshots/latest"
          TAG_DIR="docs/screenshots/tags/${TAG}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          test -d "$SCREEN_SRC"
          mkdir -p "$LATEST_DIR" "$TAG_DIR"

          # Keep README embeds and tag archives in sync with latest successful tagged smoke run.
          rm -f "$LATEST_DIR"/*.bmp
          cp "$SCREEN_SRC"/*.bmp "$LATEST_DIR"/
          cp "$SCREEN_SRC"/*.bmp "$TAG_DIR"/

          cat > "$LATEST_DIR/manifest.json" <<EOF
          {
            "tag": "${TAG}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "${RUN_URL}",
            "commit": "${GITHUB_SHA}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          cat > "$TAG_DIR/manifest.json" <<EOF
          {
            "tag": "${TAG}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "${RUN_URL}",
            "commit": "${GITHUB_SHA}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot updates to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(screens): refresh screenshots for ${TAG} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            out/disk_tester.tap
            out/disk_tester_plus3.dsk
            out/headless/disk_tester.tap
            out/headless/disk_tester_plus3.dsk
            out/screen-check/**
          if-no-files-found: error

      - name: Test result summary
        if: success()
        run: |
          echo "✅ All smoke tests passed"
          if [ -n "${{ steps.tag_semver.outputs.tag }}" ]; then
            echo "🏷️ Tag: ${{ steps.tag_semver.outputs.tag }}"
            echo "📦 Artifacts: zx3-disk-test-${{ steps.tag_semver.outputs.tag }}"
          else
            echo "📦 Artifacts: zx3-disk-test-${GITHUB_SHA}"
          fi

      - name: Test failure details
        if: failure()
        run: |
          echo "❌ Smoke test failed"
          exit 1
