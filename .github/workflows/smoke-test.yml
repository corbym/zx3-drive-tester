name: Smoke Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  packages: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}-toolchain:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull prebuilt toolchain image
        id: pull-toolchain
        run: |
          if docker pull "${{ steps.image.outputs.ref }}"; then
            docker tag "${{ steps.image.outputs.ref }}" zx3-disk-test:ci
            echo "source=pulled" >> "$GITHUB_OUTPUT"
          else
            echo "source=built" >> "$GITHUB_OUTPUT"
          fi

      - name: Build fallback toolchain image
        if: steps.pull-toolchain.outputs.source == 'built'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: zx3-disk-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build project artifacts
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && ./deploy.sh"

      - name: Run smoke test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && ./tools/zesarux_smoketest.py --no-build --machine P340 --run-timeout 180 --headless --emulator-binary /usr/local/bin/zesarux"

      - name: Test result summary
        if: success()
        run: |
          echo "✅ All smoke tests passed"

      - name: Test failure details
        if: failure()
        run: |
          echo "❌ Smoke test failed"
          exit 1
