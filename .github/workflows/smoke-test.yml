name: Smoke Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write
  packages: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}-toolchain:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull prebuilt toolchain image
        id: pull-toolchain
        run: |
          if docker pull "${{ steps.image.outputs.ref }}"; then
            docker tag "${{ steps.image.outputs.ref }}" zx3-disk-test:ci
            echo "source=pulled" >> "$GITHUB_OUTPUT"
          else
            echo "source=built" >> "$GITHUB_OUTPUT"
          fi

      - name: Build fallback toolchain image
        if: steps.pull-toolchain.outputs.source == 'built'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: zx3-disk-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build project artifacts
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && ./deploy.sh"

      - name: Run smoke test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            zx3-disk-test:ci \
            bash -c "cd /workspace && ./tools/zesarux_smoketest.py --no-build --machine P340 --run-timeout 180 --headless --emulator-binary /usr/local/bin/zesarux"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zx3-disk-test-${{ github.sha }}
          path: |
            out/disk_tester.tap
            out/disk_tester_plus3.dsk
          if-no-files-found: error

      - name: Create and push release tag
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          git fetch --tags --force

          TAG=$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$TAG" ]; then
            latest_tag=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -z "$latest_tag" ]; then
              TAG="v0.1.0"
            else
              version=${latest_tag#v}
              major=$(echo "$version" | cut -d. -f1)
              minor=$(echo "$version" | cut -d. -f2)
              patch=$(echo "$version" | cut -d. -f3)
              TAG="v${major}.${minor}.$((patch + 1))"
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG (${GITHUB_SHA})"
            git push origin "$TAG"
            echo "Created and pushed $TAG"
          else
            echo "Using existing tag on this commit: $TAG"
          fi

      - name: Test result summary
        if: success()
        run: echo "✅ All smoke tests passed"

      - name: Test failure details
        if: failure()
        run: |
          echo "❌ Smoke test failed"
          exit 1
