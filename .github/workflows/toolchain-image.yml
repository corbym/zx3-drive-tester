name: Publish Toolchain Image

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - Dockerfile
      - .github/workflows/toolchain-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-toolchain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image
        run: |
          echo "latest=ghcr.io/${GITHUB_REPOSITORY,,}-toolchain:latest" >> "$GITHUB_OUTPUT"
          echo "sha=ghcr.io/${GITHUB_REPOSITORY,,}-toolchain:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.latest }}
            ${{ steps.image.outputs.sha }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ github.repository }}-toolchain:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ github.repository }}-toolchain:buildcache,mode=max